<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
        .cursor-pointer { cursor: pointer; }
        #loader {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body class="bg-light">

<div id="loader" class="hidden">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark hidden" id="navbar">
    <div class="container">
        <a class="navbar-brand" href="#">TicketSystem</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white" id="user-display">Guest</span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Выход</button>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div id="auth-screen" class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Вход в систему</h3>
                    <form onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label class="form-label">Login</label>
                            <input type="text" id="login" class="form-control" required value="admin">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="login-password" class="form-control" required value="password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Войти</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="dashboard-title">Мои обращения</h2>
            <button class="btn btn-primary" id="create-btn" onclick="openCreateModal()">+ Новое обращение</button>
        </div>

        <div class="card mb-3 shadow-sm bg-white">
            <div class="card-body py-3">
                <div class="row g-2">
                    <div class="col-md-4">
                        <input type="text" id="filter-title" class="form-control"
                               placeholder="🔍 Поиск по теме..." oninput="applyFiltersDebounced()">
                    </div>
                    <div class="col-md-3">
                        <select id="filter-status" class="form-select" onchange="applyFilters()">
                            <option value="">Все статусы</option>
                            <option value="todo">ToDo</option>
                            <option value="in_progress">In Progress</option>
                            <option value="review">Ready For Review</option>
                            <option value="done">Done</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="filter-sort-by" class="form-select" onchange="applyFilters()">
                            <option value="created_at">📅 По дате</option>
                            <option value="title">🔤 По теме</option>
                            <option value="status_code">📌 По статусу</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-secondary w-100" id="btn-order-by" onclick="toggleOrder()">
                            ⬇️ Новые
                        </button>
                        <input type="hidden" id="filter-order-by" value="DESC">
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th scope="col" style="width: 5%">ID</th>
                        <th scope="col" style="width: 30%">Тема</th>
                        <th scope="col" style="width: 15%">Статус</th>
                        <th scope="col" style="width: 20%">Теги</th>
                        <th scope="col" style="width: 15%">Дата</th>
                        <th scope="col" style="width: 15%">Автор</th>
                    </tr>
                    </thead>
                    <tbody id="tickets-table-body">
                    </tbody>
                </table>
            </div>
        </div>

        <nav class="mt-4 d-flex justify-content-center">
            <ul class="pagination" id="pagination-container">
            </ul>
        </nav>
    </div>
</div>

<div class="modal fade" id="ticketModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Обращение</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="ticket-form">
                    <input type="hidden" id="ticket-id">

                    <div class="mb-3">
                        <label class="form-label">Тема</label>
                        <input type="text" id="ticket-title" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea id="ticket-desc" class="form-control" rows="4" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label d-block">Теги</label>
                        <div id="tags-container" class="d-flex flex-wrap gap-2">
                        </div>
                    </div>

                    <div class="mb-3" id="status-group">
                        <label class="form-label fw-bold">Статус</label>
                        <select id="ticket-status-select" class="form-select">
                            <option value="todo">ToDo</option>
                            <option value="in_progress">In Progress</option>
                            <option value="review">Ready For Review</option>
                            <option value="done">Done</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="saveTicket()">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
