version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ticket_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - ticket-network

  web:
    image: nginx:alpine
    container_name: ticket_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ticket-network

  db:
    image: mysql:8.0
    container_name: ticket_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ticket_tracker
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ticket-network

networks:
  ticket-network:
    driver: bridge

volumes:
  dbdata: